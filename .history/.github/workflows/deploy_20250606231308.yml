name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive # 确保包含子模块（如果有）
      
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          # 确保VitePress正确安装
          pnpm list vitepress
      
      - name: Debug directory structure
        run: |
          echo "Current directory:"
          pwd
          ls -la
          echo "Docs directory:"
          ls -la docs
          echo "VitePress config directory:"
          ls -la docs/.vitepress || echo "No .vitepress directory found"
      
      - name: Build with VitePress
        run: |
          # 添加详细的调试信息
          echo "Building VitePress site..."
          
          # 尝试多种构建方式
          if ! VITEPRESS_IGNORE_DEAD_LINKS=true pnpm docs:build; then
            echo "Standard build failed, trying alternative methods..."
            
            # 方法1: 使用绝对路径构建
            if [ -f "docs/.vitepress/config.js" ] || [ -f "docs/.vitepress/config.mjs" ]; then
              pnpm exec vitepress build docs
            # 方法2: 尝试根目录构建
            elif [ -f ".vitepress/config.js" ] || [ -f ".vitepress/config.mjs" ]; then
              pnpm exec vitepress build .
            else
              echo "::error::No valid VitePress config found!"
              exit 1
            fi
          fi
          
          # 验证dist目录是否存在
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "::warning::Dist directory not found at docs/.vitepress/dist, searching alternatives..."
            
            # 尝试其他可能的路径
            if [ -d ".vitepress/dist" ]; then
              echo "Found dist at .vitepress/dist"
              mv .vitepress/dist docs/.vitepress/dist
            elif [ -d "dist" ]; then
              echo "Found dist at root dist"
              mkdir -p docs/.vitepress
              mv dist docs/.vitepress/dist
            else
              echo "::error::Build failed - dist directory not found anywhere!"
              echo "Possible locations:"
              find . -name dist -type d
              exit 1
            fi
          fi
      
      - name: Configure Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

# 设置token访问权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过正在运行和最新队列之间的运行队列
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 如果未启用lastUpdated，则不需要

      - name: Setup pnpm
        uses: pnpm/action-setup@v2  # 安装pnpm并添加到环境变量
        with:
          version: 10.8.1  # 指定需要的pnpm版本

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: pnpm  # 设置缓存

      - name: Setup Pages
        uses: actions/configure-pages@v3  # 在工作流中自动配置Github Pages

      - name: Install dependencies
        run: pnpm install  # 安装依赖

      - name: Build with VitePress
        run: | 
          pnpm run docs:build  # 启动项目
          touch .nojekyll  # 通知GitHub Pages不要使用Jekyll处理站点
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2  # 上传构建产物
        with:
          path: .vitepress/dist  # 指定上传的路径

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}  # 从部署的输出中获取URL
    needs: build  # 在build完成后执行
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment  # 指定id
        uses: actions/deploy-pages@v2  # 部署构建产物到GitHub Pages
